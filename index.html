<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>360 Search</title>

  <style>
    body {
      margin: 0;
      background: #0d0f12;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* Top Navigation Bar */
    .top-nav {
      width: 100%;
      height: 60px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-right: 40px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links div {
      cursor: pointer;
      opacity: 0.7;
    }

    .nav-links .active {
      opacity: 1;
      font-weight: bold;
    }

    /* Center Search Section */
    .search-container {
      margin-top: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .search-box {
      width: 500px;
      max-width: 90%;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #4f8cff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #results {
      margin-top: 40px;
      width: 600px;
      max-width: 90%;
    }

    .result-item {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

  <!-- TOP NAV BAR -->
  <div class="top-nav">
    <div class="logo">360</div>

    <div class="nav-links">
      <div class="active">Search</div>
      <div>Images</div>
    </div>
  </div>

  <!-- CENTER SEARCH -->
  <div class="search-container">
    <h1>360 Search</h1>

    <div class="search-box">
      <input id="query" type="text" placeholder="Search the web...">
      <button onclick="search()">Go</button>
    </div>

    <div id="results"></div>
  </div>

  <script>
    function search() {
      const q = document.getElementById('query').value;
      const results = document.getElementById('results');

      results.innerHTML = `
        <div class="result-item">
          <strong>Fake result for:</strong> ${q}
        </div>
      `;
    }
  </script>

</body>
</html>
